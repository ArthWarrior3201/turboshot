<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turboshot Platform</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        
        /* Default Logo Centering (Landing/Signup/Thank You) */
        .logo-container { 
            margin-top: 20px; 
            margin-bottom: 20px; 
            text-align: center; 
            transition: all 0.3s ease;
        }
        .logo-container img { width: 200px; height: auto; }

        /* Modified Top-Left Logo Class for Platform Feed */
        body.on-platform .logo-container {
            position: absolute;
            top: 15px;
            left: 20px;
            margin: 0;
            text-align: left;
            z-index: 100;
        }
        body.on-platform .logo-container img {
            width: 140px;
        }

        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; }
        .hidden { display: none !important; }
        .btn { background-color: #000000; color: #ffffff; border: none; padding: 12px 30px; font-size: 16px; font-weight: bold; border-radius: 25px; cursor: pointer; transition: transform 0.2s; }
        .btn:hover { transform: scale(1.05); }
        .form-group { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 15px; }
        input, select, textarea { width: 85%; padding: 12px 15px; font-size: 16px; border: 2px solid #e0e0e0; border-radius: 8px; outline: none; text-align: center; font-family: inherit; }
        input:focus, select:focus, textarea:focus { border-color: #000000; }
        .error-msg { color: #ff3b30; font-size: 14px; margin-top: -5px; width: 85%; }
        
        /* Trending Stories Horizontal Bar Grid */
        .trending-wrapper {
            width: 90%;
            margin-bottom: 15px;
            text-align: left;
        }
        .trending-title {
            font-size: 14px;
            font-weight: bold;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .trending-container {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            width: 100%;
            padding-bottom: 8px;
            scrollbar-width: none;
        }
        .trending-container::-webkit-scrollbar {
            display: none;
        }
        .story-card {
            flex: 0 0 85px;
            height: 120px;
            background: linear-gradient(135deg, #0052D4, #4364F7, #6FB1FC);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 8px;
            box-sizing: border-box;
            color: #ffffff;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(67, 100, 247, 0.2);
            transition: transform 0.2s;
        }
        .story-card:hover {
            transform: scale(1.03);
        }
