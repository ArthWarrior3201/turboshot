<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turboshot Platform</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        
        /* Default Logo Centering (Landing/Signup/Thank You) */
        .logo-container { 
            margin-top: 20px; 
            margin-bottom: 20px; 
            text-align: center; 
            transition: all 0.3s ease;
        }
        .logo-container img { width: 200px; height: auto; }

        /* Modified Top-Left Logo Class for Platform Feed */
        body.on-platform .logo-container {
            position: absolute;
            top: 15px;
            left: 20px;
            margin: 0;
            text-align: left;
            z-index: 100;
        }
        body.on-platform .logo-container img {
            width: 140px;
        }

        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; }
        .hidden { display: none !important; }
        .btn { background-color: #000000; color: #ffffff; border: none; padding: 12px 30px; font-size: 16px; font-weight: bold; border-radius: 25px; cursor: pointer; transition: transform 0.2s; }
        .btn:hover { transform: scale(1.05); }
        .form-group { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 15px; }
        input, select, textarea { width: 85%; padding: 12px 15px; font-size: 16px; border: 2px solid #e0e0e0; border-radius: 8px; outline: none; text-align: center; font-family: inherit; }
        input:focus, select:focus, textarea:focus { border-color: #000000; }
        .error-msg { color: #ff3b30; font-size: 14px; margin-top: -5px; width: 85%; }
        
        /* Trending Stories Horizontal Bar Grid */
        .trending-wrapper {
            width: 90%;
            margin-bottom: 15px;
            text-align: left;
        }
        .trending-title {
            font-size: 14px;
            font-weight: bold;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .trending-container {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            width: 100%;
            padding-bottom: 8px;
            scrollbar-width: none;
        }
        .trending-container::-webkit-scrollbar {
            display: none;
        }
        .story-card {
            flex: 0 0 85px;
            height: 120px;
            background: linear-gradient(135deg, #0052D4, #4364F7, #6FB1FC);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 8px;
            box-sizing: border-box;
            color: #ffffff;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(67, 100, 247, 0.2);
            transition: transform 0.2s;
        }
        .story-card:hover {
            transform: scale(1.03);
        }
        .story-username {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            opacity: 0.9;
        }
        .story-likes {
            font-size: 10px;
            background: rgba(25px, 25px, 25px, 0.2);
            padding: 2px 4px;
            border-radius: 4px;
            width: fit-content;
            margin-top: 2px;
        }

        /* Feed Layout styling */
        .feed-container { width: 100%; display: flex; flex-direction: column; gap: 20px; margin-top: 30px; }
        .post-card { background: #f9f9f9; border: 1px solid #eee; border-radius: 15px; padding: 20px; text-align: left; width: 85%; margin: 0 auto; position: relative; }
        .post-header { font-weight: bold; margin-bottom: 10px; color: #333; }
        .post-media { width: 100%; border-radius: 10px; margin-top: 10px; max-height: 300px; object-fit: cover; }
        .audio-player { width: 100%; margin-top: 10px; }
        
        /* Engagement Controls (Likes) */
        .post-actions {
            display: flex;
            align-items: center;
            margin-top: 15px;
            gap: 8px;
        }
        .like-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s ease;
        }
        .like-btn:active { transform: scale(1.3); }
        .like-count {
            font-size: 14px;
            font-weight: bold;
            color: #444;
        }
    </style>
</head>
<body>

    <!-- Dynamic Logo Element -->
    <div class="logo-container" id="main-logo-wrap">
        <img src="file_00000000f95871fa94e929d0d7969f29.png?v=1" alt="Turboshot Logo">
    </div>

    <div id="landing-screen" class="container">
        <button class="btn" onclick="showSignUp()">Sign Up</button>
    </div>

    <div id="form-screen" class="container hidden">
        <form id="signup-form" class="form-group" onsubmit="handleSignUp(event)">
            <input type="text" id="username" placeholder="Choose Username" required>
            <div id="username-error" class="error-msg"></div>
            
            <input type="text" id="fullname" placeholder="Name" required>
            <input type="email" id="email" placeholder="Email" required>
            
            <input type="text" id="phone" placeholder="+00 XXXXXXXXXXX" required>
            <div id="phone-error" class="error-msg"></div>

            <button type="submit" class="btn">Complete</button>
        </form>
    </div>

    <div id="thankyou-screen" class="container hidden">
        <h1 style="font-size: 28px; margin-bottom: 25px;">Thank You</h1>
        <button class="btn" onclick="goToPlatform()">Continue</button>
    </div>

    <!-- Live Platform Hub Screen -->
    <div id="platform-screen" class="container hidden" style="max-width: 600px; margin-top: 60px;">
        <h2 id="welcome-banner">@username's Turboshot Feed</h2>
        
        <!-- Trending Stories Horizontal Bar Grid -->
        <div class="trending-wrapper">
            <div class="trending-title">🔥 Trending Right Now</div>
            <div id="trending-stories-row" class="trending-container"></div>
        </div>
        
        <div class="form-group" style="background: #f5f5f7; padding: 20px; border-radius: 20px; width: 90%;">
            <textarea id="post-text" placeholder="What's happening flash fast?" rows="3" required></textarea>
            
            <select id="post-font">
                <option value="-apple-system, sans-serif">Default Modern Font</option>
                <option value="'Courier New', monospace">Retro Code Font</option>
                <option value="'Georgia', serif">Elegant Story Font</option>
                <option value="'Impact', sans-serif">Bold Meme Font</option>
            </select>

            <input type="url" id="post-media-url" placeholder="Paste Image/Video URL (Optional)">

            <select id="post-audio">
                <option value="">No Background Track</option>
                <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">Energetic Electronic</option>
                <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3">Chill Lofi Beat</option>
                <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3">Cinematic Action Mood</option>
            </select>

            <button class="btn" onclick="createPost()">Post to Turboshot</button>
        </div>

        <div id="feed" class="feed-container"></div>
    </div>

    <script>
        // Updated to use your live platform domain endpoint directly!
        const BACKEND_URL = 'https://turboshot-platform.vercel.app/api/signup';

        let currentLoggedUser = '';
        let localLikedPostIDs = []; 

        function showSignUp() {
            document.getElementById('landing-screen').classList.add('hidden');
            document.getElementById('form-screen').classList.remove('hidden');
        }

        async function handleSignUp(event) {
            event.preventDefault();
            const username = document.getElementById('username').value.trim();
            const fullname = document.getElementById('fullname').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();

            const cleanPhone = phone.replace(/\s+/g, '');
            const phoneRegex = /^\+\d{9,15}$/;

            if (!phoneRegex.test(cleanPhone)) {
                document.getElementById('phone-error').innerText = "Enter a valid country code (e.g., +91) followed by your digits.";
                return;
            } else {
                document.getElementById('phone-error').innerText = "";
            }

            try {
                const response = await fetch(`${BACKEND_URL}?action=register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, fullname, email, phone: cleanPhone })
                });

                const data = await response.json();

                if (!response.ok) {
                    document.getElementById('username-error').innerText = data.error;
                    return;
                }

                currentLoggedUser = data.username;
                document.getElementById('form-screen').classList.add('hidden');
                document.getElementById('thankyou-screen').classList.remove('hidden');
            } catch (err) {
                console.error("Backend error:", err);
                alert("Could not connect to the secure backend server system.");
            }
        }

        function goToPlatform() {
            document.body.classList.add('on-platform');
            document.getElementById('welcome-banner').innerText = `@${currentLoggedUser}'s Turboshot Feed`;
            document.getElementById('thankyou-screen').classList.add('hidden');
            document.getElementById('platform-screen').classList.remove('hidden');
            
            renderFeed();
            setInterval(renderFeed, 4000);
        }

        async function createPost() {
            const text = document.getElementById('post-text').value.trim();
            const font = document.getElementById('post-font').value;
            const mediaUrl = document.getElementById('post-media-url').value.trim();
            const audioUrl = document.getElementById('post-audio').value;

            if (!text) return;

            try {
                const signatureID = 'id_' + Math.random().toString(36).substr(2, 9);

                await fetch(`${BACKEND_URL}?action=createPost`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        user: currentLoggedUser, 
                        text, 
                        font, 
                        mediaUrl, 
                        audioUrl,
                        id: signatureID,
                        likes: 0 
                    })
                });

                document.getElementById('post-text').value = '';
                document.getElementById('post-media-url').value = '';
                renderFeed();
            } catch (err) {
                console.error(err);
            }
        }

        async function toggleLike(postId) {
            const isLiked = localLikedPostIDs.includes(postId);
            if (isLiked) {
                localLikedPostIDs = localLikedPostIDs.filter(id => id !== postId);
            } else {
                localLikedPostIDs.push(postId);
            }

            try {
                await fetch(`${BACKEND_URL}?action=likePost`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: postId, increment: !isLiked })
                });
                renderFeed();
            } catch (err) {
                console.error(err);
            }
        }

        async function renderFeed() {
            const feed = document.getElementById('feed');
            const storiesRow = document.getElementById('trending-stories-row');
            
            try {
                const res = await fetch(`${BACKEND_URL}?action=getPosts`);
                let posts = await res.json();
                
                posts.sort((a, b) => (b.likes || 0) - (a.likes || 0));

                storiesRow.innerHTML = '';
                const trendingSelection = posts.slice(0, 6);
                
                if (trendingSelection.length === 0) {
                    storiesRow.innerHTML = `<div style="font-size:12px; color:#aaa; padding: 10px;">No trending clips yet!</div>`;
                } else {
                    trendingSelection.forEach(post => {
                        storiesRow.innerHTML += `
                            <div class="story-card" onclick="document.getElementById('${post.id}').scrollIntoView({behavior: 'smooth'})">
                                <div class="story-username">@${post.user}</div>
                                <div class="story-likes">❤️ ${post.likes || 0}</div>
                            </div>
                        `;
                    });
                }

                feed.innerHTML = '';
                posts.forEach(post => {
                    let mediaElement = '';
                    if (post.mediaUrl) {
                        if (post.mediaUrl.match(/\.(mp4|webm|ogg)/i)) {
                            mediaElement = `<video src="${post.mediaUrl}" controls class="post-media"></video>`;
                        } else {
                            mediaElement = `<img src="${post.mediaUrl}" class="post-media" alt="Media content">`;
                        }
                    }

                    let audioElement = post.audioUrl ? `<audio src="${post.audioUrl}" controls class="audio-player"></audio>` : '';
                    const heartIcon = localLikedPostIDs.includes(post.id) ? '❤️' : '🤍';

                    feed.innerHTML += `
                        <div class="post-card" id="${post.id}">
                            <div class="post-header">⚡ @${post.user} • <span style="font-weight:normal; font-size:12px; color:#888;">${post.time || ''}</span></div>
                            <div style="font-family: ${post.font}; font-size: 18px; white-space: pre-wrap;">${post.text}</div>
                            ${mediaElement}
                            ${post.audioUrl ? audioElement : ''}
                            
                            <div class="post-actions">
                                <button class="like-btn" onclick="toggleLike('${post.id}')">${heartIcon}</button>
                                <span class="like-count">${post.likes || 0} likes</span>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                console.error("Error updating feed:", err);
            }
        }
    </script>
</body>
</html>
