<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turboshot Platform</title>
    <style>
        body { margin: 0; background: #f4f5f9; font-family: -apple-system, sans-serif; }
        
        /* New Top-Left Friend Notification Button */
        .top-nav { position: fixed; top: 15px; left: 15px; z-index: 1000; }
        .req-btn { background: #1d9bf0; color: white; padding: 10px 15px; border-radius: 20px; font-weight: 800; cursor: pointer; border: none; font-size: 12px; box-shadow: 0 4px 10px rgba(29,155,240,0.3); }
        
        /* Modal for Friend Requests */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 90%; max-width: 400px; padding: 20px; border-radius: 20px; }
        
        .container { display: flex; flex-direction: column; align-items: center; padding-top: 60px; }
        .app-card { background: white; padding: 20px; border-radius: 20px; width: 90%; max-width: 450px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .post-card { background: white; width: 90%; max-width: 450px; padding: 20px; border-radius: 20px; margin-bottom: 15px; }
        .btn { background: #000; color: #fff; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; }
        .feed-container { width: 100%; display: flex; flex-direction: column; align-items: center; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="top-nav">
        <button class="req-btn" onclick="toggleModal()">Friends 🔔</button>
    </div>

    <div id="friendModal" class="modal">
        <div class="modal-content">
            <h3>Connections</h3>
            <div id="request-list"></div>
            <div id="notification-area" style="font-size: 12px; color: #1d9bf0; margin-top: 10px;"></div>
            <button class="btn" onclick="toggleModal()">Close</button>
        </div>
    </div>

    <div id="platform-screen" class="container">
        <div class="app-card">
            <input type="text" id="friend-input" placeholder="Enter username...">
            <button class="btn" onclick="sendRequest()">Add Friend</button>
        </div>
        <div id="feed" class="feed-container"></div>
    </div>

    <script>
        let currentLoggedUser = localStorage.getItem("turboshot_user") || "User_" + Math.floor(Math.random()*1000);
        localStorage.setItem("turboshot_user", currentLoggedUser);
        let friends = JSON.parse(localStorage.getItem(`friends_${currentLoggedUser}`) || "[]");

        function toggleModal() {
            const modal = document.getElementById('friendModal');
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
            renderRequests();
        }

        function sendRequest() {
            let target = document.getElementById('friend-input').value;
            let reqs = JSON.parse(localStorage.getItem(`reqs_${target}`) || "[]");
            reqs.push(currentLoggedUser);
            localStorage.setItem(`reqs_${target}`, JSON.stringify(reqs));
            alert("Request sent!");
        }

        function accept(user) {
            friends.push(user);
            localStorage.setItem(`friends_${currentLoggedUser}`, JSON.stringify(friends));
            
            // Notify other user
            let note = JSON.parse(localStorage.getItem(`notes_${user}`) || "[]");
            note.push(`@${currentLoggedUser} accepted your request!`);
            localStorage.setItem(`notes_${user}`, JSON.stringify(note));
            
            renderRequests();
        }

        function renderRequests() {
            let list = document.getElementById('request-list');
            let notes = document.getElementById('notification-area');
            let reqs = JSON.parse(localStorage.getItem(`reqs_${currentLoggedUser}`) || "[]");
            let myNotes = JSON.parse(localStorage.getItem(`notes_${currentLoggedUser}`) || "[]");
            
            list.innerHTML = reqs.map(u => `<div>${u} <button onclick="accept('${u}')">Accept</button></div>`).join('');
            notes.innerHTML = myNotes.map(n => `<div>${n}</div>`).join('');
        }

        // FEED RANKER: Friends go to the top
        async function loadFeed() {
            let posts = await (await fetch('https://turboshot-platform.vercel.app/api/signup?action=getPosts')).json();
            posts.sort((a, b) => friends.includes(b.user) - friends.includes(a.user));
            
            document.getElementById('feed').innerHTML = posts.map(p => `
                <div class="post-card">
                    <b>${friends.includes(p.user) ? '⭐ ' : ''}@${p.user}</b>
                    <p>${p.text}</p>
                </div>
            `).join('');
        }

        loadFeed();
        setInterval(loadFeed, 5000);
    </script>
</body>
</html>
