<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turboshot - Sign Up</title>
    <style>
        /* Dead center alignment for everything */
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Top center logo container */
        .logo-container {
            margin-bottom: 30px;
            text-align: center;
        }

        .logo-container img {
            width: 220px; /* Adjust size of your logo here */
            height: auto;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        /* Hidden utility class */
        .hidden {
            display: none !important;
        }

        /* Button Styling */
        .btn {
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        /* Form Layout */
        .form-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            gap: 15px;
        }

        /* Input Styling */
        input {
            width: 85%;
            padding: 12px 15px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            outline: none;
            text-align: center;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #000000;
        }

        /* Error Message Styling */
        .error-msg {
            color: #ff3b30;
            font-size: 14px;
            margin-top: -5px;
            margin-bottom: 5px;
            width: 85%;
            text-align: center;
        }

        /* Complete Button at the Bottom Center */
        .submit-btn {
            margin-top: 25px;
        }

        /* Thank You Text styling */
        .thank-you-text {
            font-size: 28px;
            font-weight: bold;
            color: #000000;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="file_00000000f95871fa94e929d0d7969f29.png" alt="Turboshot Logo">
    </div>

    <div id="landing-screen" class="container">
        <button class="btn" onclick="showSignUp()">Sign Up</button>
    </div>

    <div id="form-screen" class="container hidden">
        <form id="signup-form" class="form-group" onsubmit="handleSignUp(event)">
            
            <input type="text" id="username" placeholder="Name" required>
            
            <input type="email" id="email" placeholder="Email" required>
            
            <input type="text" id="phone" placeholder="+00 XXXXXXXXXXX" required>
            <div id="phone-error" class="error-msg"></div>

            <button type="submit" class="btn submit-btn">Complete</button>
        </form>
    </div>

    <div id="thankyou-screen" class="container hidden">
        <div class="thank-you-text">Thank You</div>
    </div>

    <script>
        function showSignUp() {
            document.getElementById('landing-screen').classList.add('hidden');
            document.getElementById('form-screen').classList.remove('hidden');
        }

        function handleSignUp(event) {
            event.preventDefault();
            
            const phoneInput = document.getElementById('phone').value.trim();
            const errorDiv = document.getElementById('phone-error');
            
            const phoneRegex = /^\+[1-9]\d{0,3}\s?\d{9,11}$/;

            if (!phoneRegex.test(phoneInput)) {
                errorDiv.innerText = "Include country code (e.g., +1) followed by 9 to 11 digits.";
                return;
            }

            errorDiv.innerText = "";
            document.getElementById('form-screen').classList.add('hidden');
            document.getElementById('thankyou-screen').classList.remove('hidden');
            
            document.getElementById('signup-form').reset();
        }
    </script>
</body>
</html>
